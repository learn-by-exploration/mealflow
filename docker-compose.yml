services:
  mealflow:
    build: .
    ports:
      - "3458:3458"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
