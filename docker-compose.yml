services:
  mealflow:
    build: .
    container_name: mealflow
    ports:
      - "0.0.0.0:3458:3458"
    volumes:
      # Ensure ./data/ and ./backups/ are writable by container user (node, uid 1000)
      - ./data:/app/data
      - ./backups:/app/backups
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3458
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - SHUTDOWN_TIMEOUT_MS=15000
      - ALLOWED_ORIGINS=http://localhost:3458
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3458/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
