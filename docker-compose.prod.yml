services:
  mealflow:
    build: .
    ports:
      - "3458:3458"
    volumes:
      - mealflow-data:/app/data
      - mealflow-backups:/app/backups
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3458
      - LOG_LEVEL=info
      - SHUTDOWN_TIMEOUT_MS=15000
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3458/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mealflow-data:
  mealflow-backups:
